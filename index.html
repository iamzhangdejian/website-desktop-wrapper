<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRIT Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
    #iframe { width: 100%; height: 100%; border: none; display: block; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f3f4f6; color: #6b7280; z-index: 1000; transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Settings button - prominent */
    #settings-btn { display: none; }

    /* Settings overlay */
    #settings-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 2000;
      align-items: center; justify-content: center;
    }
    #settings-overlay.open { display: flex; }
    #settings-panel {
      background: #fff; border-radius: 12px; padding: 24px;
      width: 580px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .panel-header h2 { font-size: 20px; color: #111; }
    .panel-header .subtitle { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .lang-btn {
      padding: 4px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
      background: #f3f4f6; border: 1px solid #d1d5db; color: #374151; font-weight: 500;
    }
    .lang-btn:hover { background: #e5e7eb; }
    .section { margin-bottom: 20px; }
    .section h3 { font-size: 15px; color: #111; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #e5e7eb; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; margin-top: 10px; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    input[type="url"], input[type="number"], input[type="text"] {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .checkbox-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 10px; }
    .checkbox-row input[type="checkbox"] { margin-top: 2px; width: 16px; height: 16px; }
    .checkbox-row .cb-label { font-size: 13px; font-weight: 600; color: #374151; }
    .checkbox-row .cb-hint { font-size: 12px; color: #9ca3af; }
    .domain-item { display: flex; gap: 8px; margin-bottom: 6px; }
    .domain-item input { flex: 1; }
    .domain-item button {
      padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
      background: #fee2e2; color: #dc2626; font-size: 12px; font-weight: 500;
    }
    .domain-item button:hover { background: #fecaca; }
    .add-domain { font-size: 13px; color: #3b82f6; cursor: pointer; background: none; border: none; font-weight: 500; margin-top: 4px; }
    .add-domain:hover { color: #2563eb; }
    .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e5e7eb; }
    .btn { padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover { background: #d1d5db; }
    #settings-msg { margin-top: 12px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
    #settings-msg.show { display: block; }
    .msg-ok { background: #dcfce7; color: #166534; }
    .msg-err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p style="margin-top:14px;font-size:14px">Loading...</p></div>
  <iframe id="iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

  <button id="settings-btn" title="Settings (Cmd/Ctrl+,)">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
  </button>

  <div id="settings-overlay">
    <div id="settings-panel">
      <div class="panel-header">
        <div>
          <h2 id="lbl-title">Application Settings</h2>
          <div class="subtitle" id="lbl-subtitle">Configure the desktop wrapper application</div>
        </div>
        <button class="lang-btn" id="lang-toggle">中文</button>
      </div>

      <div class="section">
        <h3 id="lbl-website-config">Website Configuration</h3>
        <label id="lbl-url">Website URL</label>
        <input type="url" id="s-url" placeholder="https://example.com" />
        <div class="hint" id="lbl-url-hint">The URL loaded in the application window</div>

        <label id="lbl-domains" style="margin-top:14px">Allowed Domains</label>
        <div id="domains-list"></div>
        <button class="add-domain" id="add-domain-btn">+ Add Domain</button>
        <div class="hint" id="lbl-domains-hint">Reserved for future use.</div>
      </div>

      <div class="section">
        <h3 id="lbl-window">Window Settings</h3>
        <div class="row">
          <div><label id="lbl-ww">Window Width</label><input type="number" id="s-w" min="400" max="3840" /></div>
          <div><label id="lbl-wh">Window Height</label><input type="number" id="s-h" min="300" max="2160" /></div>
        </div>
        <div class="row">
          <div><label id="lbl-mw">Min Width</label><input type="number" id="s-mw" min="300" max="1920" /></div>
          <div><label id="lbl-mh">Min Height</label><input type="number" id="s-mh" min="200" max="1080" /></div>
        </div>
      </div>

      <div class="section">
        <h3 id="lbl-features">Features</h3>
        <div class="checkbox-row">
          <input type="checkbox" id="s-tray" />
          <div>
            <div class="cb-label" id="lbl-tray">System Tray</div>
            <div class="cb-hint" id="lbl-tray-hint">Show icon in system tray</div>
          </div>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="s-notif" />
          <div>
            <div class="cb-label" id="lbl-notif">Desktop Notifications</div>
            <div class="cb-hint" id="lbl-notif-hint">Show native notifications</div>
          </div>
        </div>
      </div>

      <div id="settings-msg"></div>

      <div class="actions">
        <button class="btn btn-secondary" id="s-cancel">Cancel</button>
        <button class="btn btn-primary" id="s-save">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Tauri API module -->
  <script type="module">
    import { invoke } from "@tauri-apps/api/core";
    import { listen } from "@tauri-apps/api/event";

    window.__tauriInvoke = invoke;

    (async () => {
      try {
        await listen("open-settings", () => {
          if (typeof window.openSettings === 'function') window.openSettings();
        });
        window.__eventStatus = "ok";
      } catch(e) {
        window.__eventStatus = "err:" + (e.message || e);
      }
      window.__moduleStatus = "loaded";
    })();
  </script>

  <!-- Main script -->
  <script>
    (async function() {
      var iframe = document.getElementById('iframe');
      var loading = document.getElementById('loading');
      var overlay = document.getElementById('settings-overlay');
      var msgEl = document.getElementById('settings-msg');
      var defaultUrl = 'https://work.sritcloud.com:3100/oa-office/#/pages/login/index';
      var currentSettings = null;
      var lang = localStorage.getItem('launcher_lang') || 'en';

      var i18n = {
        en: {
          title: 'Application Settings', subtitle: 'Configure the desktop wrapper application',
          websiteConfig: 'Website Configuration', url: 'Website URL',
          urlHint: 'The URL loaded in the application window',
          domains: 'Allowed Domains', domainsHint: 'Reserved for future use.',
          addDomain: '+ Add Domain', remove: 'Remove',
          window: 'Window Settings', ww: 'Window Width', wh: 'Window Height', mw: 'Min Width', mh: 'Min Height',
          features: 'Features', tray: 'System Tray', trayHint: 'Show icon in system tray',
          notif: 'Desktop Notifications', notifHint: 'Show native notifications',
          save: 'Save Settings', saving: 'Saving...', cancel: 'Cancel',
          savedUrl: 'Settings saved! Reloading...', langBtn: '中文'
        },
        zh: {
          title: '应用设置', subtitle: '配置桌面包装器应用',
          websiteConfig: '网站配置', url: '网站地址',
          urlHint: '将在应用窗口中加载的 URL',
          domains: '允许的域名', domainsHint: '保留供将来使用。',
          addDomain: '+ 添加域名', remove: '删除',
          window: '窗口设置', ww: '窗口宽度', wh: '窗口高度', mw: '最小宽度', mh: '最小高度',
          features: '功能', tray: '系统托盘', trayHint: '在系统托盘中显示图标',
          notif: '桌面通知', notifHint: '显示原生系统通知',
          save: '保存设置', saving: '保存中...', cancel: '取消',
          savedUrl: '设置已保存！即将重新加载...', langBtn: 'English'
        }
      };

      function applyLang() {
        var t = i18n[lang];
        var map = {
          'lbl-title': t.title, 'lbl-subtitle': t.subtitle,
          'lbl-website-config': t.websiteConfig, 'lbl-url': t.url, 'lbl-url-hint': t.urlHint,
          'lbl-domains': t.domains, 'lbl-domains-hint': t.domainsHint,
          'add-domain-btn': t.addDomain,
          'lbl-window': t.window, 'lbl-ww': t.ww, 'lbl-wh': t.wh, 'lbl-mw': t.mw, 'lbl-mh': t.mh,
          'lbl-features': t.features, 'lbl-tray': t.tray, 'lbl-tray-hint': t.trayHint,
          'lbl-notif': t.notif, 'lbl-notif-hint': t.notifHint,
          's-save': t.save, 's-cancel': t.cancel, 'lang-toggle': t.langBtn
        };
        for (var id in map) { var el = document.getElementById(id); if (el) el.textContent = map[id]; }
      }

      async function tauriInvoke(cmd, args) {
        var retries = 0;
        while (!window.__tauriInvoke && retries < 50) {
          await new Promise(function(r) { setTimeout(r, 100); });
          retries++;
        }
        if (!window.__tauriInvoke) throw new Error('Tauri API not available');
        return await window.__tauriInvoke(cmd, args);
      }

      async function loadSettings() {
        try { currentSettings = await tauriInvoke('get_settings'); } catch(e) {}
        return currentSettings;
      }

      function renderDomains(domains) {
        var list = document.getElementById('domains-list');
        list.innerHTML = '';
        (domains || []).forEach(function(domain) {
          var div = document.createElement('div');
          div.className = 'domain-item';
          div.innerHTML = '<input type="text" value="' + (domain || '').replace(/"/g, '&quot;') + '" /><button>' + i18n[lang].remove + '</button>';
          list.appendChild(div);
        });
      }

      function getDomains() {
        var inputs = document.querySelectorAll('#domains-list input');
        var d = [];
        inputs.forEach(function(inp) { if (inp.value.trim()) d.push(inp.value.trim()); });
        return d;
      }

      function showMsg(t, e) { msgEl.textContent = t; msgEl.className = 'show ' + (e ? 'msg-err' : 'msg-ok'); }
      function hideMsg() { msgEl.className = ''; msgEl.textContent = ''; }

      function openSettings() {
        loadSettings().then(function(s) {
          if (s) {
            document.getElementById('s-url').value = s.website_url || defaultUrl;
            document.getElementById('s-w').value = s.window_width || 1280;
            document.getElementById('s-h').value = s.window_height || 800;
            document.getElementById('s-mw').value = s.min_width || 375;
            document.getElementById('s-mh').value = s.min_height || 667;
            document.getElementById('s-tray').checked = s.enable_tray !== false;
            document.getElementById('s-notif').checked = s.enable_notifications !== false;
            renderDomains(s.allowed_domains || []);
          } else {
            document.getElementById('s-url').value = defaultUrl;
            renderDomains([]);
          }
          hideMsg(); applyLang(); overlay.classList.add('open');
        }).catch(function(e) { showMsg('Load failed: ' + e, true); });
      }

      function closeSettings() { overlay.classList.remove('open'); }
      function toggleSettings() { overlay.classList.contains('open') ? closeSettings() : openSettings(); }

      window.openSettings = openSettings;
      window.closeSettings = closeSettings;
      window.toggleSettings = toggleSettings;

      async function saveSettings() {
        var btn = document.getElementById('s-save');
        btn.disabled = true; btn.textContent = i18n[lang].saving; hideMsg();
        var ns = {
          website_url: document.getElementById('s-url').value,
          window_width: parseInt(document.getElementById('s-w').value) || 1280,
          window_height: parseInt(document.getElementById('s-h').value) || 800,
          min_width: parseInt(document.getElementById('s-mw').value) || 375,
          min_height: parseInt(document.getElementById('s-mh').value) || 667,
          enable_tray: document.getElementById('s-tray').checked,
          enable_notifications: document.getElementById('s-notif').checked,
          allowed_domains: getDomains()
        };
        try {
          await tauriInvoke('save_and_close', { newSettings: ns });
          showMsg(i18n[lang].savedUrl, false);
          loading.classList.remove('hidden');
          iframe.src = ns.website_url;
          setTimeout(closeSettings, 1200);
        } catch(e) {
          showMsg('Error: ' + (e.message || e), true);
          btn.disabled = false; btn.textContent = i18n[lang].save;
        }
      }

      // ---- Polling for menu-triggered settings ----
      setInterval(async function() {
        try {
          if (!window.__tauriInvoke) return;
          var shouldOpen = await window.__tauriInvoke('check_pending_action');
          if (shouldOpen === true) openSettings();
        } catch(e) { /* ignore polling errors */ }
      }, 300);

      // ---- Event listeners ----
      document.getElementById('settings-btn').addEventListener('click', openSettings);
      document.getElementById('s-cancel').addEventListener('click', closeSettings);
      document.getElementById('s-save').addEventListener('click', saveSettings);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeSettings(); });

      document.getElementById('add-domain-btn').addEventListener('click', function() {
        var list = document.getElementById('domains-list');
        var div = document.createElement('div');
        div.className = 'domain-item';
        div.innerHTML = '<input type="text" value="" placeholder="example.com" /><button>' + i18n[lang].remove + '</button>';
        list.appendChild(div);
      });

      document.getElementById('domains-list').addEventListener('click', function(e) {
        if (e.target.tagName === 'BUTTON') e.target.parentElement.remove();
      });

      document.getElementById('lang-toggle').addEventListener('click', function() {
        lang = lang === 'en' ? 'zh' : 'en';
        localStorage.setItem('launcher_lang', lang);
        applyLang();
      });

      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === ',') { e.preventDefault(); toggleSettings(); }
        if (e.key === 'Escape') closeSettings();
      });

      // ---- Init ----
      applyLang();
      var settings = await loadSettings();
      var targetUrl = (settings && settings.website_url) ? settings.website_url : defaultUrl;
      iframe.onload = function() { setTimeout(function() { loading.classList.add('hidden'); }, 300); };
      iframe.src = targetUrl;
    })();
  </script>
</body>
</html>
